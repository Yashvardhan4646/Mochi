<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blob Buddy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h2>🌸 Blob Buddy</h2>

  <input id="name" placeholder="Enter username">

  <select id="pet">
    <option>🐱</option>
    <option>🐶</option>
    <option>🐼</option>
    <option>🐸</option>
  </select>

  <button id="joinBtn">Join Game</button>
</div>

<div id="popup" class="popup"></div>

<script type="module">
import { db, ref, push, get } from "./firebase.js";
document.getElementById("joinBtn").addEventListener("click", join);
window.join = async () => {
  let name = document.getElementById("name").value.trim();
  let pet = document.getElementById("pet").value;

  if (!name) return show("enter name bro");

  let snap = await get(ref(db, "users"));
  let exists = false;

  snap.forEach(u => {
    if (u.val().name === name) exists = true;
  });

  if (exists) return show("username taken");

  let id = push(ref(db, "users"), {
    name,
    pet,
    online: true,
    coins: 0,
    xp: 0,
    level: 1
  }).key;

  localStorage.setItem("uid", id);
  window.location.href = "game.html";
};

function show(msg){
  let p=document.getElementById("popup");
  p.innerText=msg;
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),2000);
}
</script>

</body>
</html>
